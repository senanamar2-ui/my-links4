<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصمم تهاني العيد الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @font-face { font-family: 'Diwani'; src: url('https://fonts.cdnfonts.com/s/73105/Diwani-Regular.woff') format('woff'); }
        @font-face { font-family: 'Thuluth'; src: url('https://fonts.cdnfonts.com/s/73110/Thuluth-Regular.woff') format('woff'); }
        @font-face { font-family: 'FodaKufi'; src: url('foda-kufi.ttf') format('truetype'); }

        :root { --gold: #d4af37; --dark: #0a0a0f; --acid: #caff00; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }

        /* منطقة التصميم - المستطيل */
        #capture-area {
            margin-top: 20px;
            width: 350px;
            min-height: 500px;
            background: url('https://images.unsplash.com/photo-1586075010633-247fe9ed85a1?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            border: 2px solid var(--gold);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        #preview-text {
            font-size: 2.2rem;
            color: var(--gold);
            white-space: pre-wrap; /* هذا السر لكتابة أسطر كثيرة */
            line-height: 1.6;
            margin: 0;
            font-family: 'Diwani';
        }

        /* لوحة التحكم */
        .controls {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: #1a1a28;
            border-radius: 25px 25px 0 0;
            margin-top: auto;
            border-top: 2px solid var(--acid);
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #000;
            border: 1px solid var(--acid);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
            resize: none;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-font { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn-save { background: var(--acid); color: black; }
    </style>
</head>
<body>

    <div id="capture-area">
        <p id="preview-text">عمار سنان
مبارك عليكم العيد
وكل عام وأنتم بخير</p>
    </div>

    <div class="controls">
        <textarea id="text-input" placeholder="اكتب تهنئتك هنا (اضغط Enter للسطر الجديد)..." oninput="updateText()"></textarea>
        
        <div class="btn-group">
            <button class="btn btn-font" onclick="nextFont()">تغيير الخط</button>
            <button class="btn btn-save" onclick="saveAsImage()">حفظ كصورة ✅</button>
        </div>
        <p id="font-name" style="text-align:center; font-size:12px; color:gray; margin-top:10px;">الخط: الديواني</p>
    </div>

    <script>
        const myFonts = [
            { name: 'الديواني', family: 'Diwani' },
            { name: 'الثلث', family: 'Thuluth' },
            { name: 'كوفي فودة', family: 'FodaKufi' }
        ];
        let currentFont = 0;

        function updateText() {
            const input = document.getElementById('text-input').value;
            document.getElementById('preview-text').innerText = input || "اكتب نصك هنا";
        }

        function nextFont() {
            currentFont = (currentFont + 1) % myFonts.length;
            document.getElementById('preview-text').style.fontFamily = myFonts[currentFont].family;
            document.getElementById('font-name').innerText = "الخط: " + myFonts[currentFont].name;
        }

        function saveAsImage() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'eid-design-ammar.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
