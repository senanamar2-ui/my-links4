<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Cairo:wght@900&family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&family=Reem+Kufi:wght@700&family=Lalezar&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-acid: #caff00;
            --color-void: #0f2027;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            text-align: center;
            padding-bottom: 170px; /* مساحة للأدوات في الأسفل */
        }

        header { padding: 15px; font-family: 'Orbitron'; color: gold; letter-spacing: 2px; }

        /* تأثير التوهج الذهبي حول الكانفاس كما في كودك */
        canvas {
            background: #000;
            border: 2px solid gold;
            max-width: 95%;
            height: auto;
            margin-top: 10px;
            border-radius: 20px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            to { box-shadow: 0 0 35px rgba(255, 215, 0, 0.8); }
        }

        .controls {
            background: rgba(15, 32, 39, 0.98);
            padding: 20px;
            border-radius: 30px 30px 0 0;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            border-top: 2px solid gold;
            z-index: 2000;
        }

        textarea {
            width: 95%; height: 65px; padding: 12px; background: #000;
            border: 1px solid gold; border-radius: 12px; color: white;
            margin-bottom: 10px; text-align: center; font-family: 'Cairo'; resize: none;
        }

        .grid-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        select, button {
            padding: 12px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; font-family: 'Cairo';
        }

        select { background: #2c5364; color: white; }
        .btn-save { background: gold; color: #000; }
        
        .upload-label {
            background: rgba(255, 215, 0, 0.1); color: gold;
            padding: 8px; display: block; margin-top: 10px;
            border-radius: 10px; font-size: 13px; border: 1px dashed gold; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>GLYPH GOLD EDITION</header>

    <canvas id="mainCanvas" width="800" height="650"></canvas>

    <div class="controls">
        <textarea id="textInput" placeholder="اكتب تهنئتك هنا..." oninput="draw()">عيد مبارك</textarea>
        
        <div class="grid-tools">
            <select id="fontFamily" onchange="draw()">
                <option value="Aref Ruqaa">خط الرقعة</option>
                <option value="Cairo">خط القاهرة</option>
                <option value="Lalezar">خط لاليزار</option>
                <option value="Amiri">الخط النسخي</option>
                <option value="Reem Kufi">الخط الكوفي</option>
                <option value="Orbitron">الخط التقني</option>
            </select>
            
            <button class="btn-save" onclick="download()">💾 حفظ التصميم</button>
        </div>

        <label class="upload-label">
            🖼️ اضغط لرفع خلفية (سيتم ضبطها تلقائياً بدون ضغط)
            <input type="file" id="upload" accept="image/*" style="display:none" onchange="handleImage(event)">
        </label>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        let backgroundImg = null;

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    backgroundImg = img;
                    draw();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (backgroundImg) {
                // نظام فك الضغط الذكي (Cover)
                const canvasAspect = canvas.width / canvas.height;
                const imgAspect = backgroundImg.width / backgroundImg.height;
                let dWidth, dHeight, dx, dy;

                if (imgAspect > canvasAspect) {
                    dHeight = canvas.height;
                    dWidth = canvas.height * imgAspect;
                    dx = -(dWidth - canvas.width) / 2;
                    dy = 0;
                } else {
                    dWidth = canvas.width;
                    dHeight = canvas.width / imgAspect;
                    dx = 0;
                    dy = -(dHeight - canvas.height) / 2;
                }
                ctx.drawImage(backgroundImg, dx, dy, dWidth, dHeight);
            } else {
                // خلفية افتراضية متدرجة في حال عدم وجود صورة
                const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                bgGrad.addColorStop(0, '#0f2027');
                bgGrad.addColorStop(1, '#2c5364');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            const text = document.getElementById('textInput').value;
            const font = document.getElementById('fontFamily').value;
            let size = 75;

            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if(font === "Aref Ruqaa") size = 95;
            if(font === "Lalezar") size = 90;
            ctx.font = `bold ${size}px "${font}"`;

            const lines = text.split('\n');
            const lineHeight = size * 1.3;
            // جعل النص في النصف العلوي قليلاً لترك مساحة مريحة في الأسفل
            const startY = (canvas.height * 0.42) - ((lines.length - 1) * lineHeight / 2);

            lines.forEach((line, i) => {
                const x = canvas.width / 2;
                const y = startY + (i * lineHeight);

                // التدرج الذهبي
                const grad = ctx.createLinearGradient(x, y - size/2, x, y + size/2);
                grad.addColorStop(0, '#bf953f');
                grad.addColorStop(0.5, '#fcf6ba');
                grad.addColorStop(1, '#aa771c');

                ctx.shadowColor = "rgba(0,0,0,0.8)";
                ctx.shadowBlur = 15;
                ctx.fillStyle = grad;
                ctx.fillText(line, x, y);
            });
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'Ammar-Eid-Design.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        window.onload = draw;
    </script>
</body>
</html>
