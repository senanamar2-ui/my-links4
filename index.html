<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ammar-eid | GLYPH PRO</title>
    <!-- روابط الخطوط الأساسية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* إضافة الخطوط الاحترافية */
        @font-face { font-family: 'Diwani'; src: url('https://fonts.cdnfonts.com/s/73105/Diwani-Regular.woff') format('woff'); }
        @font-face { font-family: 'Thuluth'; src: url('https://fonts.cdnfonts.com/s/73110/Thuluth-Regular.woff') format('woff'); }
        @font-face { font-family: 'FodaKufi'; src: url('https://db.onlinewebfonts.com/t/0879684128f117c37435f3dfd2a01490.ttf') format('truetype'); }

        :root {
            --color-acid: #caff00;
            --color-void: #0a0a0f;
            --color-surface: #1a1a28;
        }

        body {
            background: var(--color-void);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .canvas-container {
            margin-top: 20px;
            position: relative;
            box-shadow: 0 0 30px rgba(202, 255, 0, 0.2);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--color-acid);
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(26, 26, 40, 0.95);
            padding: 20px;
            border-top: 2px solid var(--color-acid);
            display: grid;
            gap: 15px;
            z-index: 100;
        }

        input, select, button {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
            color: white;
            font-family: 'Cairo';
        }

        button {
            background: var(--color-acid);
            color: black;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <header style="padding: 20px; font-family: 'Cairo'; color: var(--color-acid);">GLYPH PRO</header>

    <div class="canvas-container">
        <canvas id="mainCanvas" width="800" height="600"></canvas>
    </div>

    <div class="controls">
        <input type="text" id="nameInput" placeholder="اكتب الاسم هنا..." oninput="draw()">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <select id="fontSelect" onchange="draw()">
                <option value="Cairo">خط القاهرة</option>
                <option value="Amiri">خط أميري</option>
                <option value="Diwani">خط الديواني</option>
                <option value="Thuluth">خط الثلث</option>
                <option value="FodaKufi">خط كوفي فودة</option>
            </select>
            <button onclick="download()">💾 حفظ الصورة</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1a1a28";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const name = document.getElementById('nameInput').value || "عمار سنان";
            const font = document.getElementById('fontSelect').value;
            
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `bold 70px ${font}`;

            const grad = ctx.createLinearGradient(0, 200, 0, 400);
            grad.addColorStop(0, '#bf953f');
            grad.addColorStop(0.5, '#fcf6ba');
            grad.addColorStop(1, '#aa771c');

            ctx.fillStyle = grad;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;

            ctx.fillText(name, canvas.width / 2, canvas.height * 0.45);
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'Ammar_Design.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        window.onload = draw;
    </script>
</body>
</html>
